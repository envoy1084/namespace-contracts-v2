# Default Profile – local dev & CI
[profile.default]
solc_version = "0.8.35"
evm_version = "prague"
optimizer = true
optimizer_runs = 200
ffi = true
src = "src"
out = "out"
dynamic_test_linking = true
gas_reports = ["*"]

# Fuzz testing
[fuzz]
runs = 200

# Invariant testing
[invariant]
runs = 200

# CI-specific profile
[profile.ci]
verbosity = 4

[profile.ci.fuzz]
runs = 2000

[profile.ci.invariant]
runs = 2000
